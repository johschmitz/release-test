name: Release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions:
  contents: write # This grants permission to create tags and releases

jobs:
  release:
    name: Build and release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-26
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set binary name
        shell: bash
        run: |
          echo "BIN=xodr-qcr${{ matrix.ext }}" >> "$GITHUB_ENV"
          echo "ASSET=xodr-qcr-${{ matrix.target }}${{ matrix.ext }}" >> "$GITHUB_ENV"

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/${BIN}" "${ASSET}"
          tar -czf "${ASSET}.tar.gz" "${ASSET}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${BIN}" "${ASSET}"
          7z a "${ASSET}.zip" "${ASSET}"

      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            xodr-qcr-${{ matrix.target }}${{ matrix.ext }}.tar.gz
            xodr-qcr-${{ matrix.target }}${{ matrix.ext }}.zip
          prerelease: false
          draft: false
          fail_on_unmatched_files: false
